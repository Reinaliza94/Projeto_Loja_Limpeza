<html>
    <head>
    <title> Cadastro de Cliente </title> 
    <style>
        body { 
            text-align: center; 
            padding-top: 50px; 
            background-color: antiquewhite; 
        }

        .cadastro {
            width: center;  
            font-family: Arial, Helvetica, sans-serif; 
            margin: 15px 0; 
            display: justify; 
            font-family: Arial, Helvetica, sans-serif
        }

        a {
            color: white;
            text-decoration: none;
            padding: 5px;
            margin: 5px 8px;
            border-radius: 0px;
            font-family: Arial, Helvetica, sans-serif
        }

        button {
            background-color: rgb(127, 188, 199); 
            border-radius: 5px; 
            cursor: pointer; 
            font-family: Arial, Helvetica, sans-serif
        }

    </style>
    </head>
<body>
    <h2> Cadastro de Cliente </h2>
    <div class="cadastro" >
        <label for="nome" class="form-label">Nome</label>
        <input type="text" id="nome" class="form-control"/>
    </div>
    <div class="cadastro">
        <label for="endereço" class="form-label">Endereço</label>
        <input type="text" id="endereço" class="form-control"/>
    </div>
    <div class="cadastro">
        <label for="telefone" class="form-label">Telefone</label>
        <input type="number" id="telefone" class="form-control">
    </div>
    <div class="button">
        <a href="clientes_cadastrados.html">
        <button type="submit" class="button"> Cadastrar </button></a>
    </div>
    <div class="button">
        <a href= "tela_principal.html">
        <button type="button" class="button"> Voltar </button></a>
    </div>
</body>
</html>
