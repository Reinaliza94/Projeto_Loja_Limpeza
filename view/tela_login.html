<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela Login</title>
    
    <style>
        body { 
            text-align: center; 
            padding-top: 50px; 
            background-color: antiquewhite; 
        }

        .login-container { 
            width: 300px; 
            margin: auto; 
            font-family: Arial, Helvetica, sans-serif; 
        }

        button {
            background-color: rgb(127, 188, 199);
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            padding: 8px 15px;
            border: none;
        }

        .button:hover {
            background-color: grey;
            color: white
        }

        .mb-3 {
        margin: 25px 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        font-family: Arial, Helvetica, sans-serif;
        }

        input {
        width: 250px;
        height: 30px;
        border-radius: 5px;
        border: 1px solid gray;
        padding-left: 10px;
        margin-top: 5px;
        }
        
        h2 {
            font-family: 'Courier New', Courier, monospace; 
        }
        
    </style>
</head>
<body>

    <div class="login-container">
        <img src="../imagem/logo.png" alt="Logo" class="mb-4" style="max-width: 150px;"><br>
        <h2>Seja bem-vindo!</h2>
        
        <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" id="nome" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="senha" class="form-label">Senha</label>
            <input type="password" id="senha" class="form-control"/>
        </div>

        <div class= "button"></div>
            <a href="tela_principal.html">
            <button type="button" class="button">Entrar</button></a>
        </div>

    </div>

</body>
</html>
